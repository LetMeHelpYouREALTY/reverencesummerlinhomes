name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "build/client" ]; then
            echo "❌ Build output missing: build/client directory not found"
            exit 1
          fi
          if [ ! -d "build/server" ]; then
            echo "❌ Build output missing: build/server directory not found"
            exit 1
          fi
          echo "✅ Build output verified"

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod=true'

      - name: Deployment Success Notification
        run: |
          echo "🚀 Production deployment completed successfully!"
          echo "🌐 Site: https://www.reverencesummerlinhomes.com"
